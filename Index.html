<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="icon" href="./src/public/images/favicon-32x32.png">
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            background-color: hsl(47, 88%, 63%);
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 117px;
        }

        .container {
            background-color: #fff;
            border-radius: 10px;
            border-top: 2px solid hsl(0, 0%, 42%);
            border-left: 2px solid hsl(0, 0%, 42%);
            box-shadow: 4px 7px 3px 5px hsl(0, 0%, 7%);
            display: flex;
            justify-content: center;
            width: 20vw;
            height: 64vh;
        }

        .item {
            display: flex;
            flex-direction: column;
            margin: 25px 25px;
        }

        #article {
            width: 100%;
            border-radius: 15px;

        }

        button {
            padding: 10px;
            width: 27%;
            background-color: hsl(47, 88%, 63%);
            border: none;
            margin-top: 25px;
            border-radius: 3px;
        }

        h6 {
            margin-top: 15px;
            font-size: 10px;

        }

        a {
            text-decoration: none;
            color: black;
            font-weight: bolder;
            font-size: 22px;
            margin-top: 15px;
        }

        a:hover {
            color: hsl(47, 88%, 63%);
            ;
        }

        p {
            margin-top: 15px;
            justify-content: flex-start;
            padding: 1px;
            color: gray;
            font-size: 15px;
        }

        .item2 {
            margin-top: 15px;
            display: flex;
        }

        #image-avatar {
            width: 30px;
            margin-top: 5px;
        }

        span {
            margin: 5px;
        }

        @media(max-width:475px) {
            body {
                background-color: hsl(47, 88%, 63%);
            }

            .container {
                background-color: #fff;
                border-radius: 10px;
                border-top: 2px solid hsl(0, 0%, 42%);
                border-left: 2px solid hsl(0, 0%, 42%);
                box-shadow: 4px 7px 3px 5px hsl(0, 0%, 7%);
                display: flex;
                justify-content: center;
                width: 80vw;
                height: 57vh;
            }

            span {
                margin: 11px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="item">
            <img id="article" src="./src/public/images/illustration-article.svg" alt="">
            <button>Learning</button>
            <h6>Published 21 Dec 2023</h6>
            <a href="#">HTML & CSS Foundation</a>
            <p>These languages are the backbone of every
                website, defining structure, Content, and
                presentation. </p>
            <div class="item2">
                <img id="image-avatar" src="./src/public/images/image-avatar.webp" alt="">
                <span>Greg Hooper</span>
            </div>

        </div>
    </div>
</body>

</html>
